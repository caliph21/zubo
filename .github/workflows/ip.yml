name: FOFA IP & IPTV Sync

on:
  schedule:
    # FOFA 任务：每 15 分钟执行一次
    - cron: "*/15 * * * *"
    # IPTV 任务：每 2 小时执行一次（UTC时间）
    - cron: "0 */2 * * *"
  workflow_dispatch:          # 手动触发

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install ffmpeg and wget
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget git

      # ===== FOFA 任务部分 =====
      - name: Run fofa_fetch.py
        run: python fofa_fetch.py

      # ===== IPTV 任务部分 =====
      - name: Clone and Copy IPTV Playlists
        run: |
          set -e
          echo "🎵 开始更新 IPTV 播放列表..."
          
          # 删除旧的m3u文件
          echo "🗑️ 删除旧的m3u文件..."
          rm -f yylb.m3u hyyqk.m3u dyyqk.m3u yylunbo.m3u huyayqk.m3u douyuyqk.m3u
          echo "✅ 已删除旧文件"
          
          # 克隆源仓库
          echo "📥 克隆源仓库..."
          git clone --depth 1 https://github.com/mursor1985/LIVE.git temp_repo
          
          # 复制并重命名文件
          echo "📝 复制并重命名文件..."
          
          if [ -f "temp_repo/yylunbo.m3u" ]; then
            cp temp_repo/yylunbo.m3u ./yylb.m3u
            echo "✅ yylunbo.m3u → yylb.m3u"
          else
            echo "⚠️ 未找到 yylunbo.m3u"
          fi
          
          if [ -f "temp_repo/huyayqk.m3u" ]; then
            cp temp_repo/huyayqk.m3u ./hyyqk.m3u
            echo "✅ huyayqk.m3u → hyyqk.m3u"
          else
            echo "⚠️ 未找到 huyayqk.m3u"
          fi
          
          if [ -f "temp_repo/douyuyqk.m3u" ]; then
            cp temp_repo/douyuyqk.m3u ./dyyqk.m3u
            echo "✅ douyuyqk.m3u → dyyqk.m3u"
            # 对 dyyqk.m3u 进行URL替换
            sed -i 's#https://live.ottiptv.cc#https://goodiptv.club#g' ./dyyqk.m3u
            echo "🔧 已将 dyyqk.m3u 中的 live.ottiptv.cc 替换为 goodiptv.club"
          else
            echo "⚠️ 未找到 douyuyqk.m3u"
          fi
          
          if [ -f "temp_repo/bililive.m3u" ]; then
            cp temp_repo/bililive.m3u ./bililive.m3u
            echo "✅ bililive.m3u → bililive.m3u"
          else
            echo "⚠️ 未找到 bililive.m3u"
          fi
          
          # 清理临时仓库
          rm -rf temp_repo
          
          # 显示文件状态
          echo "📊 文件复制状态："
          for f in yylb.m3u hyyqk.m3u dyyqk.m3u bililive.m3u; do
            if [ -s "$f" ]; then
              echo "✅ $f - $(wc -c < "$f") 字节"
            else
              echo "❌ $f - 文件不存在或为空"
            fi
          done

      # ===== 统一提交部分 =====
      - name: Check for changes and commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          
          echo "🔍 检查文件变更..."
          
          # 添加可能存在的文件
          git add 计数.txt 2>/dev/null || true
          git add ip/*.txt 2>/dev/null || true
          git add iTV.txt 2>/dev/null || true
          
          # 添加重命名后的m3u文件
          git add yylb.m3u hyyqk.m3u dyyqk.m3u bililive.m3u 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ 没有检测到文件变更，跳过提交"
            exit 0
          else
            echo "📝 变更的文件："
            git diff --cached --name-only
            
            commit_msg="自动更新："
            
            # 检查变更类型
            if git diff --cached --name-only | grep -q "计数.txt\|ip/.*\.txt\|iTV.txt"; then
              commit_msg="${commit_msg}组播源"
            fi
            
            if git diff --cached --name-only | grep -q "\.m3u$"; then
              if [[ "$commit_msg" == *"组播源"* ]]; then
                commit_msg="${commit_msg} 和 IPTV播放列表"
              else
                commit_msg="${commit_msg}IPTV播放列表"
              fi
            fi
            
            commit_msg="${commit_msg} - $(date '+%Y-%m-%d %H:%M:%S')"
            
            git commit -m "$commit_msg"
            echo "✅ 已提交变更：$commit_msg"
          fi

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin ${GITHUB_REF_NAME:-main} || echo "⚠️ 推送失败，可能是没有变更或权限问题"
